# ═══════════════════════════════════════════════════════════════════════
# 7venHotel Cloud — Configuration Nginx (Hostinger VPS)
# Fichier à placer dans : /etc/nginx/sites-available/7venhotel
# Puis activer avec : sudo ln -s /etc/nginx/sites-available/7venhotel /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════════════

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;
    return 301 https://$host$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl http2;
    server_name votre-domaine.com www.votre-domaine.com;

    # ── SSL ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Sécurité ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── Taille max upload ─────────────────────────────────────────────
    client_max_body_size 15M;

    # ── Logs ──────────────────────────────────────────────────────────
    access_log /home/claude/public_html/ocs7venHotel/logs/access/nginx.log;
    error_log  /home/claude/public_html/ocs7venHotel/logs/error/nginx.log;

    # ── Fichiers uploadés (statiques) ─────────────────────────────────
    location /uploads/ {
        alias /home/claude/public_html/ocs7venHotel/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }

    # ── API Backend (Fastify port 3001) ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # ── Frontend Next.js (port 3000) ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_comp_level 6;
    gzip_min_length 1024;
}
